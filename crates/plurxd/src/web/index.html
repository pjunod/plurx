<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>plurx</title>
<style>
  :root{
    --bg:#0e0f13; --panel:#171922; --panel2:#1e2230; --line:#2a2f3e;
    --text:#e8eaf0; --muted:#9aa2b4; --accent:#6ea8fe; --accent2:#8b7cf6;
    --good:#4ade80; --bad:#f87171; --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent);text-decoration:none}
  button{font:inherit;cursor:pointer;border:0;border-radius:8px;padding:9px 14px;background:var(--accent);color:#07101f;font-weight:600}
  button.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  button.sm{padding:5px 10px;font-size:13px}
  button:disabled{opacity:.5;cursor:default}
  input,select{font:inherit;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px;width:100%}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}

  header.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;
    padding:12px 20px;background:rgba(14,15,19,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .logo{font-weight:800;letter-spacing:.5px;font-size:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .top nav{display:flex;gap:4px;flex-wrap:wrap}
  .top nav a{padding:7px 12px;border-radius:8px;color:var(--muted)}
  .top nav a.active,.top nav a:hover{background:var(--panel2);color:var(--text)}
  .top .spacer{flex:1}
  .search{max-width:240px}
  main{padding:22px 20px 60px;max-width:1400px;margin:0 auto}

  .center{min-height:100dvh;display:grid;place-items:center;padding:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px}
  .auth{width:100%;max-width:380px}
  .auth h1{margin:.2em 0 .1em}

  h2.section{font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:26px 4px 12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
  .rowscroll{display:grid;grid-auto-flow:column;grid-auto-columns:200px;gap:16px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin}
  .poster{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s;position:relative}
  .poster:hover{transform:translateY(-3px);border-color:var(--accent)}
  .poster .art{aspect-ratio:2/3;width:100%;object-fit:cover;display:block;background:linear-gradient(160deg,#232838,#171a24)}
  .poster.wide .art{aspect-ratio:16/9}
  .poster .meta{padding:8px 10px}
  .poster .t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .poster .s{font-size:12px;color:var(--muted)}
  .poster .prog{position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(0,0,0,.5)}
  .poster .prog>i{display:block;height:100%;background:var(--accent)}
  .badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border-radius:6px;padding:2px 6px;font-size:11px}
  .empty{color:var(--muted);padding:40px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius)}

  .detail{display:grid;grid-template-columns:260px 1fr;gap:28px}
  .detail .poster{cursor:default}
  .detail .poster:hover{transform:none;border-color:var(--line)}
  .detail h1{margin:0 0 6px}
  .overview{color:#cdd2df;max-width:70ch}
  .filebox{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);font-size:14px}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:none;place-items:center;padding:20px}
  .modal.open{display:grid}
  .player{width:min(1100px,96vw)}
  .player video{width:100%;border-radius:12px;background:#000;max-height:80dvh}
  .player .bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);
    padding:10px 16px;border-radius:10px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .err{color:var(--bad);font-size:13px;min-height:18px;margin-top:8px}
  .adminwrap{display:grid;grid-template-columns:1fr;gap:22px;max-width:960px}
  .problem{color:var(--bad);font-size:12px;margin-top:3px;font-weight:400}
  .hint{color:var(--muted);font-size:12px;margin-top:6px}
  .activity{display:none;align-items:center;gap:8px;font-size:12px;color:var(--muted);
    background:var(--panel2);border:1px solid var(--line);padding:5px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .activity .spin{width:10px;height:10px;flex:none;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .kvgrid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13px;margin:0}
  .kvgrid dt{color:var(--muted)} .kvgrid dd{margin:0;word-break:break-all}
  .logbox{background:#0a0b0f;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:10px;
    max-height:380px;overflow:auto;font:12px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap}
  .log-ERROR{color:var(--bad)} .log-WARN{color:#fbbf24} .log-INFO{color:var(--text)}
  .log-DEBUG,.log-TRACE{color:var(--muted)}
  .verrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0}
  .verrow+.verrow{border-top:1px solid var(--line)}
  .crumbs{font-size:13px;color:var(--muted);margin:0 0 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .crumbs .sep{opacity:.45}
  .crumbs .cur{color:var(--text)}
  .art.ph{display:grid;place-items:center;font-size:30px;font-weight:800;letter-spacing:.5px;color:#39415a;user-select:none}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal" id="modal"><div class="player card"><div class="bar"><div id="playTitle" style="font-weight:600"></div><div class="row"><button class="ghost sm" id="apbtn" style="display:none" title="AirPlay">📺 AirPlay</button><button class="ghost sm" onclick="closePlayer()">Close</button></div></div><video id="video" controls autoplay playsinline x-webkit-airplay="allow"></video></div></div>
<div class="toast" id="toast"></div>

<script src="/assets/hls.min.js"></script>
<script>
"use strict";
const API = "/api/v1";
let TOKEN = localStorage.getItem("plurx_token") || null;
let ME = null;

// ---- api helpers ----------------------------------------------------------
async function api(path, {method="GET", body=null, raw=false}={}){
  const headers={};
  if(TOKEN) headers["authorization"]="Bearer "+TOKEN;
  if(body){ headers["content-type"]="application/json"; }
  const res=await fetch(API+path,{method,headers,body:body?JSON.stringify(body):null});
  if(res.status===401){ logout(); throw new Error("unauthorized"); }
  if(!res.ok){ let m="request failed"; try{m=(await res.json()).error||m}catch(e){} throw new Error(m); }
  return raw?res:res.json();
}
const tok = u => u + (u.includes("?")?"&":"?") + "token=" + encodeURIComponent(TOKEN||"");
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function fmtDur(ms){ if(!ms) return ""; const s=Math.round(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60); return h?`${h}h ${m}m`:`${m}m`; }
function fmtSize(b){ if(!b) return ""; const g=b/(1024**3); return g>=1?g.toFixed(1)+" GB":Math.round(b/(1024**2))+" MB"; }
function fmtUptime(s){ const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60); return d?`${d}d ${h}h`:(h?`${h}h ${m}m`:`${m}m`); }
function fmtTs(ms){ const d=new Date(ms); return d.toLocaleTimeString([], {hour12:false})+"."+String(ms%1000).padStart(3,"0"); }
function fmtAgo(unix){ if(!unix) return ""; const s=Math.max(0,Math.floor(Date.now()/1000)-unix);
  if(s<60) return "just now"; if(s<3600) return Math.floor(s/60)+"m ago"; if(s<86400) return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }
function esc(s){ return (s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// Artwork with a graceful fallback: initials on a tinted card when there's
// no poster (so a seasons grid never shows blank rectangles).
function artHtml(it, cls){
  const src=it.poster||it.backdrop;
  if(src) return `<img class="art ${cls||''}" loading="lazy" src="${tok(src)}" alt="">`;
  const label=(it.season_number!=null&&it.kind==='season')?("S"+it.season_number):
    ((it.title||"?").split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?");
  return `<div class="art ph ${cls||''}">${esc(label)}</div>`;
}

// ---- auth flows -----------------------------------------------------------
function logout(){ TOKEN=null; ME=null; localStorage.removeItem("plurx_token"); clearInterval(ACT_TIMER); ACT_TIMER=null; render(); }
async function boot(){
  let server;
  try{ server=await api("/server"); }catch(e){ document.getElementById("app").innerHTML=`<div class="center"><div class="card">Server unreachable.</div></div>`; return; }
  if(server.setup_required){ return renderSetup(server); }
  if(!TOKEN){ return renderLogin(server); }
  try{ ME=await api("/me"); }catch(e){ return renderLogin(server); }
  location.hash=location.hash||"#/";
  render();
}
function authShell(title, sub, fields, btn, onsubmit){
  document.getElementById("app").innerHTML=`<div class="center"><form class="card auth" id="af">
    <div class="logo" style="font-size:30px">plurx</div>
    <h1>${title}</h1><p class="muted" style="margin-top:0">${sub}</p>
    ${fields}<div class="err" id="aerr"></div>
    <button style="width:100%;margin-top:16px" id="ab">${btn}</button></form></div>`;
  document.getElementById("af").addEventListener("submit",async e=>{
    e.preventDefault(); const b=document.getElementById("ab"); b.disabled=true;
    try{ await onsubmit(); }catch(err){ document.getElementById("aerr").textContent=err.message; b.disabled=false; }
  });
}
function renderSetup(){
  authShell("Welcome","Create your admin account to get started.",
    `<label>Username</label><input id="u" autocomplete="username" required>
     <label>Password</label><input id="p" type="password" autocomplete="new-password" required placeholder="at least 8 characters">`,
    "Create account", async()=>{
      const r=await api("/setup",{method:"POST",body:{username:u.value.trim(),password:p.value}});
      TOKEN=r.token; localStorage.setItem("plurx_token",TOKEN); ME=r.user; location.hash="#/"; render();
    });
}
function renderLogin(){
  authShell("Sign in","Welcome back.",
    `<label>Username</label><input id="u" autocomplete="username" required>
     <label>Password</label><input id="p" type="password" autocomplete="current-password" required>`,
    "Sign in", async()=>{
      const r=await api("/auth/login",{method:"POST",body:{username:u.value.trim(),password:p.value,device:"Web"}});
      TOKEN=r.token; localStorage.setItem("plurx_token",TOKEN); ME=r.user; location.hash="#/"; render();
    });
}

// ---- chrome ---------------------------------------------------------------
function chrome(active, inner){
  const admin = ME&&ME.is_admin ? `<a href="#/settings" class="${active==='settings'?'active':''}">Settings</a>`:"";
  const back = (location.hash&&location.hash!=="#/") ? `<button class="ghost sm" onclick="history.back()" title="Back">‹ Back</button>`:"";
  document.getElementById("app").innerHTML=`
   <header class="top">
     ${back}<a href="#/" class="logo">plurx</a>
     <nav><a href="#/" class="${active==='home'?'active':''}">Home</a>${admin}</nav>
     <span class="spacer"></span>
     <span class="activity" id="activity" onclick="${ME&&ME.is_admin?"location.hash='#/settings'":""}"></span>
     <input class="search" id="q" placeholder="Search…" value="${esc(getQ())}">
     <span class="muted" style="font-size:13px">${esc(ME?ME.username:"")}</span>
     <button class="ghost sm" onclick="logout()">Sign out</button>
   </header><main id="main">${inner}</main>`;
  const q=document.getElementById("q");
  let t; q.addEventListener("input",()=>{ clearTimeout(t); t=setTimeout(()=>{ location.hash= q.value?("#/search/"+encodeURIComponent(q.value)):"#/"; },300); });
  pollActivity();
}
function getQ(){ const m=location.hash.match(/^#\/search\/(.*)$/); return m?decodeURIComponent(m[1]):""; }

// ---- global activity indicator --------------------------------------------
// Always-visible pill: whatever the server is doing right now (scans,
// metadata, streams — later: moves, backups). Empty response = hidden.
let ACT_TIMER=null;
async function pollActivity(){
  if(!TOKEN||!ME) return;
  const el=document.getElementById("activity");
  if(!el) return;
  try{
    const acts=await api("/activity");
    if(!acts.length){ el.style.display="none"; el.innerHTML=""; return; }
    const a=acts[0];
    const bits=[esc(a.label)];
    if(a.detail) bits.push(esc(a.detail));
    if(a.percent!=null) bits.push(a.percent+"%");
    const extra=acts.length>1?` &nbsp;+${acts.length-1}`:"";
    el.innerHTML=`<span class="spin"></span><span>${bits.join(" · ")}${extra}</span>`;
    el.style.display="flex";
  }catch(e){}
}

// ---- cards ----------------------------------------------------------------
function progressPct(w){ if(!w||!w.duration_ms||!w.position_ms) return 0; return Math.min(100,100*w.position_ms/w.duration_ms); }
function card(it, wide){
  const img = artHtml(it);
  const sub = it.kind==='episode'
      ? esc((it.show_title?it.show_title+" · ":"")+`S${it.season_number||0}E${it.episode_number||0}`)
      : esc(it.year? String(it.year): (it.kind==='show'?'Series':''));
  const pct = progressPct(it.watch);
  const watched = it.watch&&it.watch.watched? `<span class="badge">✓</span>`:"";
  const prog = pct>0&&pct<100? `<div class="prog"><i style="width:${pct}%"></i></div>`:"";
  return `<div class="poster ${wide?'wide':''}" onclick="location.hash='#/item/${it.id}'">
    ${img}${watched}<div class="meta"><div class="t">${esc(it.title)}</div><div class="s">${sub}</div></div>${prog}</div>`;
}
function grid(items){ return items.length? `<div class="grid">${items.map(i=>card(i)).join("")}</div>` : `<div class="empty">Nothing here yet.</div>`; }

// ---- views ----------------------------------------------------------------
async function viewHome(){
  chrome("home", `<div id="hubs"><div class="empty">Loading…</div></div>`);
  const [libs, hubs] = await Promise.all([api("/libraries"), api("/hubs")]);
  let html="";
  if(hubs.continue_watching.length){ html+=`<h2 class="section">Continue watching</h2><div class="rowscroll">${hubs.continue_watching.map(i=>card(i,true)).join("")}</div>`; }
  if(hubs.next_up && hubs.next_up.length){ html+=`<h2 class="section">Next up</h2><div class="rowscroll">${hubs.next_up.map(i=>card(i,i.kind==='episode')).join("")}</div>`; }
  if(hubs.recently_added.length){ html+=`<h2 class="section">Recently added</h2><div class="rowscroll">${hubs.recently_added.map(i=>card(i,i.kind==='episode')).join("")}</div>`; }
  for(const lib of libs){
    const page=await api(`/libraries/${lib.id}/items?limit=24&sort=added`);
    html+=`<h2 class="section">${esc(lib.name)} <a class="muted" style="font-size:12px" href="#/library/${lib.id}">· view all (${page.total})</a></h2>${grid(page.items)}`;
  }
  if(!libs.length){ html=`<div class="empty">No libraries yet.${ME.is_admin?' Add one in <a href="#/settings">Settings</a>.':''}</div>`; }
  document.getElementById("main").innerHTML=html||`<div class="empty">Nothing here yet.</div>`;
}
async function viewLibrary(id){
  chrome("home",`<div class="empty">Loading…</div>`);
  const lib=(await api("/libraries")).find(l=>l.id==id);
  const page=await api(`/libraries/${id}/items?limit=200&sort=title`);
  document.getElementById("main").innerHTML=`<h2 class="section">${esc(lib?lib.name:'Library')} · ${page.total}</h2>${grid(page.items)}`;
}
async function viewSearch(q){
  chrome("home",`<div class="empty">Searching…</div>`);
  const r=await api(`/search?q=${encodeURIComponent(q)}`);
  document.getElementById("main").innerHTML=`<h2 class="section">Results for “${esc(q)}”</h2>${grid(r.results)}`;
}
async function viewItem(id){
  chrome("home",`<div class="empty">Loading…</div>`);
  const d=await api(`/items/${id}`); const it=d.item;
  // Map this item's files → item id so the player can post progress.
  d.files.forEach(f=>ITEM_FOR_FILE[f.id]=Number(id));
  const imgTag = artHtml(it);
  // In-app breadcrumb trail: Home / Show / Season / …, every level clickable.
  const trail=[`<a href="#/">Home</a>`]
    .concat((d.ancestors||[]).map(a=>`<a href="#/item/${a.id}">${esc(a.title)}</a>`))
    .concat([`<span class="cur">${esc(it.title)}</span>`]);
  let right=`<div class="crumbs">${trail.join('<span class="sep">/</span>')}</div>`;
  const runtime = it.runtime_ms || (d.files[0]&&d.files[0].duration_ms);
  right+=`<h1>${esc(it.title)}</h1><div class="row muted">${[it.year,fmtDur(runtime),it.kind].filter(Boolean).map(x=>`<span>${esc(String(x))}</span>`).join(" · ")}</div>`;
  if(it.overview) right+=`<p class="overview">${esc(it.overview)}</p>`;

  // Movie / episode: play button + versions. Show/season: children grid.
  if(d.files.length){
    const f=d.files[0]; // best version first (server sorts by resolution)
    const resume = it.watch&&it.watch.position_ms>3000&&!it.watch.watched? it.watch.position_ms:0;
    right+=`<div class="row" style="margin-top:16px">
      <button onclick='play(${f.id},${JSON.stringify(it.title)},${resume},${f.duration_ms||0})'>▶ ${resume?`Resume (${fmtDur(resume)})`:'Play'}</button>
      ${resume?`<button class="ghost" onclick='play(${f.id},${JSON.stringify(it.title)},0,${f.duration_ms||0})'>Start over</button>`:''}
      <button class="ghost sm" id="wb" onclick="toggleWatched(${it.id}, ${it.watch&&it.watch.watched?1:0})">${it.watch&&it.watch.watched?'Mark unwatched':'Mark watched'}</button>
    </div>`;
    const multi=d.files.length>1;
    const rows=d.files.map(v=>{
      const parts=[v.height&&`${v.height}p`,v.video_codec,v.hdr,(v.audio_streams[0]||{}).codec,v.container,fmtSize(v.size),fmtDur(v.duration_ms)].filter(Boolean);
      return `<div class="verrow"><div style="min-width:0"><div class="muted" style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.filename)}</div>
        <div class="kv">${parts.map(c=>`<span class="pill">${esc(String(c))}</span>`).join("")}</div></div>
        ${multi?`<button class="ghost sm" style="flex:none" onclick='play(${v.id},${JSON.stringify(it.title)},${resume},${v.duration_ms||0})'>▶ Play</button>`:""}</div>`;
    }).join("");
    right+=`<div class="filebox">${multi?`<div class="muted" style="font-size:12px;margin-bottom:2px">${d.files.length} versions</div>`:""}${rows}</div>`;
  }
  if(d.children.length){
    const kids=d.children;
    right+=`<h2 class="section" style="margin-left:0">${kids[0].kind==='season'?'Seasons':'Episodes'}</h2>${grid(kids)}`;
  }
  document.getElementById("main").innerHTML=`<div class="detail"><div class="poster">${imgTag}</div><div>${right}</div></div>`;
}

async function toggleWatched(id, watched){
  try{ await api(`/items/${id}/${watched?'unscrobble':'scrobble'}`,{method:"POST"}); toast(watched?"Marked unwatched":"Marked watched"); viewItem(id); }
  catch(e){ toast(e.message); }
}

// ---- player ---------------------------------------------------------------
// Three playback methods (server /decision picks one):
//  direct_play → native <video>, client-side seek/resume
//  remux       → progressive fMP4 from ffmpeg, server fast-seek for resume
//  transcode   → HLS via hls.js (ffmpeg tone-maps/re-encodes), offset resume
let PLAYER={fileId:null,timer:null,offset:0,hls:null,knownDur:0};
async function play(fileId, title, resumeMs, knownDurMs){
  const modal=document.getElementById("modal"), video=document.getElementById("video");
  document.getElementById("playTitle").textContent=title;
  modal.classList.add("open");
  let decision; try{ decision=await api(`/files/${fileId}/decision?profile=web-h264`);}catch(e){ toast(e.message); return closePlayer(); }
  const startSec=(resumeMs||0)/1000;
  teardownHls();
  PLAYER={fileId, timer:null, offset:0, hls:null, knownDur:knownDurMs||0};
  setupAirplay(video);

  // Safari/iOS play HLS natively (required for AirPlay — MSE streams can't be
  // sent to an Apple TV as video); everything else uses hls.js.
  const nativeHls = video.canPlayType('application/vnd.apple.mpegurl');
  if(decision.method==='transcode'){
    // Transcode: start an HLS session (server re-encodes + tone-maps).
    let info; try{ info=await api(`/files/${fileId}/hls/start?height=720&start=${startSec.toFixed(1)}`);}catch(e){ toast(e.message); return closePlayer(); }
    PLAYER.offset = info.start_seconds||0;
    if(!nativeHls && window.Hls && Hls.isSupported()){
      const hls=new Hls({xhrSetup:x=>{ if(TOKEN) x.setRequestHeader("authorization","Bearer "+TOKEN); }});
      PLAYER.hls=hls;
      hls.loadSource(info.playlist_url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR,(_,d)=>{ if(d.fatal) toast("Playback error: "+d.details); });
    } else {
      // Native HLS: the session id in the URL is the credential, so the
      // Apple TV can fetch segments itself when AirPlaying.
      video.src=tok(info.playlist_url); video.play().catch(()=>{});
    }
  } else {
    // Direct play or remux → native <video> (token in URL: AirPlay-safe).
    const isRemux = decision.method!=='direct_play';
    let url=tok(decision.play_url);
    if(isRemux){ PLAYER.offset=startSec; if(startSec>0) url+="&start="+startSec.toFixed(1); }
    video.src=url;
    video.onloadedmetadata=()=>{ if(!isRemux && startSec>0){ try{video.currentTime=startSec}catch(e){} } };
    video.play().catch(()=>{});
  }

  clearInterval(PLAYER.timer);
  PLAYER.timer=setInterval(()=>reportProgress(fileId), 5000);
  video.onended=()=>{ reportProgress(fileId,true); };
}
function setupAirplay(video){
  const btn=document.getElementById("apbtn");
  if(!btn) return;
  if(window.WebKitPlaybackTargetAvailabilityEvent){
    video.addEventListener("webkitplaybacktargetavailabilitychanged",e=>{
      btn.style.display = e.availability==="available"?"":"none";
    });
    btn.onclick=()=>{ try{ video.webkitShowPlaybackTargetPicker(); }catch(e){} };
  } else { btn.style.display="none"; }
}
function teardownHls(){ if(PLAYER&&PLAYER.hls){ try{PLAYER.hls.destroy()}catch(e){} PLAYER.hls=null; } }
async function reportProgress(fileId, ended){
  const video=document.getElementById("video");
  const posMs=Math.round(((PLAYER.offset||0)+ (video.currentTime||0))*1000);
  // The file's probed duration is the truth; a progressive stream's
  // video.duration grows as it buffers and must not be reported.
  const durMs = PLAYER.knownDur
    || (video.duration&&isFinite(video.duration)? Math.round(((PLAYER.offset||0)+video.duration)*1000):null);
  if(!ITEM_FOR_FILE[fileId]) return;
  try{ await api(`/items/${ITEM_FOR_FILE[fileId]}/progress`,{method:"POST",body:{position_ms:ended?(durMs||posMs):posMs,duration_ms:durMs}}); }catch(e){}
}
function closePlayer(){
  const video=document.getElementById("video");
  if(PLAYER.fileId) reportProgress(PLAYER.fileId);
  clearInterval(PLAYER.timer); teardownHls(); video.pause(); video.removeAttribute("src"); video.load();
  document.getElementById("modal").classList.remove("open");
  if(location.hash.startsWith("#/item/")) { const id=location.hash.split("/")[2]; setTimeout(()=>viewItem(id),100); }
}
// map fileId → itemId, filled by viewItem so progress posts to the right item
const ITEM_FOR_FILE={};

// ---- settings -------------------------------------------------------------
function statusText(st){
  if(!st) return "idle";
  if(st.running){
    if(st.phase==="enriching") return "fetching metadata…";
    const p=st.progress;
    return "scanning…"+(p&&p.found?` ${p.processed} / ${p.found} files`:"");
  }
  if(st.error) return `<span style="color:var(--bad)">error: ${esc(st.error)}</span>`;
  if(st.last_scan){
    const r=st.last_scan;
    let s=`${r.added} added, ${r.updated} updated, ${r.unchanged} unchanged`;
    if(r.removed_files) s+=`, ${r.removed_files} removed`;
    if(r.skipped) s+=`, ${r.skipped} skipped`;
    if(r.errors) s+=`, <span style="color:var(--bad)">${r.errors} error${r.errors>1?'s':''}</span>`;
    if(st.finished_at) s+=` <span style="opacity:.7">· ${fmtAgo(st.finished_at)}</span>`;
    s+=(r.problems||[]).map(p=>`<div class="problem">⚠ ${esc(p)}</div>`).join("");
    return s;
  }
  return "idle";
}
async function viewSettings(){
  if(!ME.is_admin){ location.hash="#/"; return; }
  chrome("settings",`<div class="empty">Loading…</div>`);
  const [libs,settings,status,sys,users]=await Promise.all([api("/libraries"),api("/settings"),api("/scan/status"),api("/system"),api("/users")]);
  const libRows=libs.map(l=>`<tr><td><b>${esc(l.name)}</b></td><td>${l.anime?'anime':l.kind}</td><td class="muted">${esc(l.paths.join(", "))}</td>
      <td class="muted" id="st-${l.id}">${statusText(status[l.id])}</td>
      <td class="row" style="flex-wrap:nowrap"><button class="ghost sm" onclick="scanLib(${l.id})">Scan</button><button class="ghost sm" onclick="delLib(${l.id})">Delete</button></td></tr>`).join("");
  const enc=sys.encoders||{};
  const pills=[["NVENC",enc.nvenc],["QuickSync",enc.qsv],["VA-API",enc.vaapi],["VideoToolbox",enc.videotoolbox]]
    .map(([n,ok])=>`<span class="pill" style="${ok?'color:var(--good);border-color:var(--good)':''}">${n} ${ok?'✓':'—'}</span>`).join(" ");
  document.getElementById("main").innerHTML=`<div class="adminwrap">
    <div class="card"><h2 class="section" style="margin-top:0">Server</h2>
      <dl class="kvgrid">
        <dt>Server</dt><dd>${esc(sys.name)} · plurx ${esc(sys.version)} · up ${fmtUptime(sys.uptime_seconds)}</dd>
        <dt>Data dir</dt><dd>${esc(sys.data_dir)}</dd>
        <dt>ffmpeg</dt><dd>${sys.ffmpeg_version?esc(sys.ffmpeg_version):`<span style="color:var(--bad)">not found at \`${esc(sys.ffmpeg)}\` — scanning and transcoding will fail</span>`}</dd>
        <dt>Hardware</dt><dd>${pills}</dd>
        <dt>Transcoder</dt><dd>${esc(sys.encoder_selected)} <span class="muted">(preference: ${esc(sys.hwaccel_pref)})</span></dd>
        <dt>Right now</dt><dd>${sys.active_transcodes} active stream${sys.active_transcodes===1?'':'s'} · ${sys.libraries} librar${sys.libraries===1?'y':'ies'} · ${sys.users} user${sys.users===1?'':'s'}</dd>
      </dl></div>
    <div class="card"><h2 class="section" style="margin-top:0">Libraries</h2>
      <table><thead><tr><th>Name</th><th>Kind</th><th>Paths</th><th>Status</th><th></th></tr></thead>
      <tbody>${libRows||`<tr><td colspan="5" class="muted">No libraries yet.</td></tr>`}</tbody></table>
      <h2 class="section">Add library</h2>
      <div class="row"><input id="ln" placeholder="Name" style="max-width:180px">
        <select id="lk" style="max-width:130px"><option value="movies">Movies</option><option value="shows">TV Shows</option><option value="anime">Anime</option></select>
        <input id="lp" placeholder="/path/to/media (comma-separated)"></div>
      <div class="hint">Paths are as the <b>server process</b> sees them — running in Docker, that's the path inside the container (e.g. <code>/media/movies</code>), which must be mounted in your compose file.</div>
      <div class="err" id="lerr"></div>
      <button style="margin-top:12px" onclick="addLib()">Add & scan</button>
    </div>
    <div class="card"><h2 class="section" style="margin-top:0">Users</h2>
      <table><thead><tr><th>User</th><th>Role</th><th>Created</th><th></th></tr></thead>
      <tbody>${users.map(u=>userRow(u)).join("")}</tbody></table>
      <h2 class="section">Add user</h2>
      <div class="row"><input id="un" placeholder="Username" style="max-width:180px" autocomplete="off">
        <input id="up" placeholder="Password (min 8)" type="password" style="max-width:200px" autocomplete="new-password">
        <label class="row" style="margin:0;font-size:13px;color:var(--muted)"><input type="checkbox" id="ua" style="width:auto"> admin</label></div>
      <div class="err" id="uerr"></div>
      <button style="margin-top:12px" onclick="addUser()">Add user</button></div>
    <div class="card"><h2 class="section" style="margin-top:0">Metadata (TMDB)</h2>
      <p class="muted" style="margin-top:0">${settings.tmdb_configured?"A TMDB API key is configured. Enter a new one to replace it.":"Add a TMDB API key to fetch posters, overviews, and episode data."}</p>
      <input id="tk" placeholder="TMDB API key" type="password"><div class="err" id="terr"></div>
      <button style="margin-top:12px" onclick="saveTmdb()">Save key</button></div>
    <div class="card"><h2 class="section" style="margin-top:0">Logs</h2>
      <div class="row"><select id="loglvl" style="max-width:120px" onchange="refreshLogs()">
          <option value="info" selected>Info+</option><option value="warn">Warnings+</option>
          <option value="error">Errors</option><option value="debug">Debug+</option></select>
        <label class="row" style="margin:0;font-size:13px;color:var(--muted)"><input type="checkbox" id="logauto" checked style="width:auto"> auto-refresh</label>
        <button class="ghost sm" onclick="refreshLogs()">Refresh</button></div>
      <div class="logbox" id="logbox">Loading…</div></div>
  </div>`;
  refreshLogs();
  setPageTimer(settingsTick, 2000);
}
async function settingsTick(){
  const h=location.hash;
  if(h!=="#/settings"&&h!=="#/admin") return;
  try{
    const status=await api("/scan/status");
    for(const [id,st] of Object.entries(status)){
      const el=document.getElementById("st-"+id);
      if(el) el.innerHTML=statusText(st);
    }
    const auto=document.getElementById("logauto");
    if(auto&&auto.checked) refreshLogs();
  }catch(e){}
}
async function refreshLogs(){
  const box=document.getElementById("logbox"); if(!box) return;
  const sel=document.getElementById("loglvl");
  try{
    const lines=await api(`/system/logs?level=${sel?sel.value:"info"}&limit=300`);
    const stick = box.scrollHeight-box.scrollTop-box.clientHeight < 40;
    box.innerHTML=lines.map(l=>`<div class="log-${esc(l.level)}">${fmtTs(l.ts_ms)} <b>${esc(l.level)}</b> ${esc(l.target)} — ${esc(l.message)}</div>`).join("")
      ||'<span class="muted">Nothing at this level yet.</span>';
    if(stick) box.scrollTop=box.scrollHeight;
  }catch(e){ box.textContent="Failed to load logs: "+e.message; }
}
async function addLib(){
  const name=ln.value.trim(), sel=lk.value, paths=lp.value.split(",").map(s=>s.trim()).filter(Boolean);
  // "Anime" is a shows library flagged anime (absolute numbering + AniList).
  const kind = sel==="anime" ? "shows" : sel;
  const anime = sel==="anime";
  const err=document.getElementById("lerr"); err.textContent="";
  try{ await api("/libraries",{method:"POST",body:{name,kind,paths,anime}}); toast("Library added — scanning"); viewSettings(); }
  catch(e){ err.textContent=e.message; }
}
async function scanLib(id){ try{ await api(`/libraries/${id}/scan`,{method:"POST"}); toast("Scan started"); setTimeout(settingsTick,400);}catch(e){toast(e.message)} }
async function delLib(id){ if(!confirm("Delete this library? Media files are not touched.")) return; try{ await api(`/libraries/${id}`,{method:"DELETE"}); toast("Deleted"); viewSettings(); }catch(e){toast(e.message)} }
async function saveTmdb(){ const err=document.getElementById("terr"); err.textContent=""; try{ await api("/settings",{method:"PUT",body:{tmdb_api_key:tk.value.trim()}}); toast("Saved"); viewSettings(); }catch(e){err.textContent=e.message} }

// ---- users (admin) --------------------------------------------------------
function userRow(u){
  const me = ME&&ME.id===u.id;
  const created = new Date(u.created_at*1000).toLocaleDateString();
  const role = u.is_admin?`<span class="pill" style="color:var(--accent);border-color:var(--accent)">admin</span>`:`<span class="muted">user</span>`;
  const btns=[`<button class="ghost sm" onclick='resetPw(${u.id},${JSON.stringify(u.username)})'>Reset password</button>`];
  btns.push(`<button class="ghost sm" onclick="setAdmin(${u.id},${u.is_admin?0:1})">${u.is_admin?'Revoke admin':'Make admin'}</button>`);
  if(!me) btns.push(`<button class="ghost sm" onclick='delUser(${u.id},${JSON.stringify(u.username)})'>Delete</button>`);
  return `<tr><td><b>${esc(u.username)}</b>${me?' <span class="muted">(you)</span>':''}</td><td>${role}</td><td class="muted">${created}</td>
    <td class="row" style="flex-wrap:wrap;justify-content:flex-end">${btns.join("")}</td></tr>`;
}
async function addUser(){
  const username=un.value.trim(), password=up.value, is_admin=ua.checked;
  const err=document.getElementById("uerr"); err.textContent="";
  try{ await api("/users",{method:"POST",body:{username,password,is_admin}}); toast("User added"); viewSettings(); }
  catch(e){ err.textContent=e.message; }
}
async function resetPw(id, name){
  const pw=prompt(`New password for ${name} (min 8 characters). Their current sessions will be signed out.`);
  if(pw==null) return;
  try{ await api(`/users/${id}`,{method:"PUT",body:{password:pw}}); toast("Password reset"); }catch(e){ toast(e.message); }
}
async function setAdmin(id, makeAdmin){
  try{ await api(`/users/${id}`,{method:"PUT",body:{is_admin:!!makeAdmin}}); toast(makeAdmin?"Now an admin":"Admin revoked"); viewSettings(); }catch(e){ toast(e.message); }
}
async function delUser(id, name){
  if(!confirm(`Delete ${name}? Their watch history is removed. Media files are untouched.`)) return;
  try{ await api(`/users/${id}`,{method:"DELETE"}); toast("User deleted"); viewSettings(); }catch(e){ toast(e.message); }
}

// ---- router ---------------------------------------------------------------
// One page-scoped poller at a time; routing away always clears it.
let PAGE_TIMER=null;
function setPageTimer(fn,ms){ clearInterval(PAGE_TIMER); PAGE_TIMER=setInterval(fn,ms); }
async function render(){
  if(!TOKEN||!ME) return boot();
  clearInterval(PAGE_TIMER);
  if(!ACT_TIMER) ACT_TIMER=setInterval(pollActivity,4000);
  const h=location.hash||"#/";
  try{
    if(h.startsWith("#/item/")) return await viewItem(h.split("/")[2]);
    if(h.startsWith("#/library/")) return await viewLibrary(h.split("/")[2]);
    if(h.startsWith("#/search/")) return await viewSearch(decodeURIComponent(h.split("/")[2]||""));
    if(h==="#/admin"||h==="#/settings") return await viewSettings();
    return await viewHome();
  }catch(e){
    if(e.message!=="unauthorized"){ const m=document.getElementById("main"); if(m) m.innerHTML=`<div class="empty">${esc(e.message)}</div>`; else toast(e.message); }
  }
}
window.addEventListener("hashchange",render);

boot();
</script>
</body>
</html>
