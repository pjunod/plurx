}

async function toggleWatched(id, watched){
  try{ await api(`/items/${id}/${watched?'unscrobble':'scrobble'}`,{method:"POST"}); toast(watched?"Marked unwatched":"Marked watched"); viewItem(id); }
  catch(e){ toast(e.message); }
}

// ---- player ---------------------------------------------------------------
// Three playback methods (server /decision picks one):
//  direct_play → native <video>, client-side seek/resume
//  remux       → progressive fMP4 from ffmpeg, server fast-seek for resume
//  transcode   → HLS via hls.js (ffmpeg tone-maps/re-encodes), offset resume
let PLAYER={fileId:null,timer:null,offset:0,hls:null,knownDur:0,durMs:0,markers:[],source:null,started:false,idleTimer:null,autoskip:false};
let PLAYER_WIRED=false;
// Native HLS (`video.src = playlist.m3u8`) is for real Safari ONLY — it's what
// makes AirPlay work (an MSE stream can't be flung to an Apple TV). The trap:
// modern Chrome answers "maybe" to canPlayType('application/vnd.apple.mpegurl')
// because it grew a half-working built-in HLS player — which downloads the
// playlist and first segment and then silently never plays (the gray-screen
// bug). So the gate is the WebKit AirPlay API, which only Safari has, never
// canPlayType alone. Everyone else gets hls.js (MSE), which is the tested path.
function useNativeHls(video){
  if(!video.canPlayType('application/vnd.apple.mpegurl')) return false;
  if(window.WebKitPlaybackTargetAvailabilityEvent !== undefined) return true;   // real Safari/iOS
  return !(window.Hls && Hls.isSupported());   // non-Safari: native only if hls.js can't run
}
// One place that attaches an HLS playlist to the video element (used by start,
// seek-restart, and audio-switch). Worker off: a wallet extension's injected
// CSP can silently kill a blob worker; main-thread demux of one 720p stream
// is nothing.
function attachHls(video, playlistUrl){
  if(!useNativeHls(video) && window.Hls && Hls.isSupported()){
    const hls=new Hls({enableWorker:false,xhrSetup:x=>{ if(TOKEN) x.setRequestHeader("authorization","Bearer "+TOKEN); }});
    PLAYER.hls=hls;
    hls.loadSource(playlistUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR,(_,d)=>{ if(d.fatal){ console.warn("[cinemarr] hls.js fatal",d.type,d.details); setLoading(true,"Playback failed to start ("+d.details+").","the server couldn't build this stream — see Settings → Logs"); toast("Playback failed ("+d.details+")"); } });
  } else {
    // Native HLS: the session id in the URL is the credential, so the
    // Apple TV can fetch segments itself when AirPlaying.
    video.src=tok(playlistUrl); video.play().catch(()=>{});
  }
}

// ---- runtime playback capabilities ----------------------------------------
// What THIS browser can actually decode, probed once. Sent on every decision so
// the server direct-plays/remuxes whatever the browser supports and only
// transcodes what it genuinely can't — Safari keeps HEVC, everyone keeps their
// own audio codecs, etc. HDR is claimed only on an HDR display (else the server
// tone-maps, since HDR-on-SDR looks washed-out).
const PLAY_CAPS=(function(){
  let v=null; try{ v=document.createElement("video"); }catch(e){}
  const can=t=>{ try{ return !!v && v.canPlayType(t)!==""; }catch(e){ return false; } };
  const mse=t=>{ try{ return !!(window.MediaSource && MediaSource.isTypeSupported(t)); }catch(e){ return false; } };
  const vc=["h264"];
  if(can('video/mp4; codecs="hvc1.1.6.L93.B0"')||mse('video/mp4; codecs="hvc1.1.6.L93.B0"')) vc.push("hevc");
  if(can('video/mp4; codecs="av01.0.05M.08"')||mse('video/mp4; codecs="av01.0.05M.08"')) vc.push("av1");
  if(can('video/webm; codecs="vp9"')||mse('video/webm; codecs="vp9"')) vc.push("vp9");
  if(can('video/webm; codecs="vp8"')) vc.push("vp8");
  const ac=["aac","mp3"];
  if(can('audio/mp4; codecs="opus"')||mse('audio/webm; codecs="opus"')) ac.push("opus");
  if(can('audio/flac')||mse('audio/mp4; codecs="flac"')) ac.push("flac");
  if(can('audio/mp4; codecs="ac-3"')) ac.push("ac3");    // Safari: "maybe"; most others ""
  if(can('audio/mp4; codecs="ec-3"')) ac.push("eac3");
  const hdrDisplay=!!(window.matchMedia && window.matchMedia("(dynamic-range: high)").matches);
  const hdr=hdrDisplay && (vc.includes("hevc")||vc.includes("av1"));
  return {vcodec:vc.join(","), acodec:ac.join(","), container:"mp4,webm,mov", hdr:hdr?1:0};
})();
const CAPS_Q=`vcodec=${PLAY_CAPS.vcodec}&acodec=${PLAY_CAPS.acodec}&container=${PLAY_CAPS.container}&hdr=${PLAY_CAPS.hdr}`;

// Manual quality override (player menu), persisted per browser. Auto runs the
// automatic ladder; Original never transcodes video (direct/remux only); a
// height forces a transcode at that size.
const QUALITIES=[["auto","Auto"],["original","Original"],["1080","1080p"],["720","720p"],["480","480p"]];
function playQuality(){ try{ return localStorage.getItem("plurx_quality")||"auto"; }catch(e){ return "auto"; } }
function qualityForce(){ const q=playQuality(); return q==="auto"?"auto":(q==="original"?"original":"transcode"); }
function transcodeHeight(){ const q=playQuality(); return (q==="1080"||q==="720"||q==="480")?parseInt(q,10):720; }
function qualityLabel(){ const q=playQuality(); const f=QUALITIES.find(x=>x[0]===q); return f?f[1]:"Auto"; }

async function play(fileId, title, resumeMs, knownDurMs){
  const modal=document.getElementById("modal"), video=document.getElementById("video");
  wirePlayer();
  document.getElementById("playTitle").textContent=title;
  modal.classList.add("open");
  setLoading(true,"Reading media…","checking the file on the server");
  let decision; try{ decision=await api(`/files/${fileId}/decision?${CAPS_Q}&force=${qualityForce()}`);}catch(e){ setLoading(false); toast(e.message); return closePlayer(); }
  const startSec=(resumeMs||0)/1000;
  teardownHls();
  const src=decision.source||{};
  PLAYER={fileId, timer:null, offset:0, hls:null, knownDur:knownDurMs||0,
    durMs:(src.duration_ms||knownDurMs||0), method:decision.method, encoder:null,
    audio:decision.audio||[], subs:(decision.subtitles||[]).filter(s=>s.text),
    curAudio:(decision.audio||[]).findIndex(a=>a.default), curSub:-1,
    markers:(decision.markers||[]).map(m=>({...m})), source:src, started:false,
    idleTimer:null, autoskip:autoskipOn(), stallTimer:null, probeUrl:null, triedFallback:false,
    aoffset:decision.audio_offset_ms||0, declared:decision.declared_offset_ms||0,
    reasons:(decision.reasons||[]), title, };
  if(PLAYER.curAudio<0) PLAYER.curAudio=0;
  setupAirplay(video);
  setupTrackMenus();
  renderSkip(null);
  const sb=document.getElementById("skipbtn"); if(sb) sb.classList.toggle("on", PLAYER.autoskip);
  // Server-chosen default subtitle (Settings → Playback defaults / anime rule).
  // Native <track> subs ride direct/remux only; transcode burns them instead.
  const defSub=PLAYER.subs.find(s=>s.default);
  if(defSub && decision.method!=='transcode'){ setTimeout(()=>{ if(PLAYER.fileId===fileId) setSub(defSub.index); }, 400); }

  if(decision.method==='transcode'){
    // Transcode: start an HLS session (server re-encodes + tone-maps).
    setLoading(true,"Starting the transcoder…",transcodeReason(decision));
    let info; try{ info=await api(`/files/${fileId}/hls/start?height=${transcodeHeight()}&start=${startSec.toFixed(1)}`);}catch(e){ setLoading(false); toast(e.message); return closePlayer(); }
    PLAYER.offset = info.start_seconds||0;
    PLAYER.encoder = info.encoder||null;
    setLoading(true,"Preparing the stream…",(PLAYER.encoder?("encoder: "+PLAYER.encoder+" — "):"")+"buffering the first segments");
    PLAYER.probeUrl=info.playlist_url; armStall();
    attachHls(video, info.playlist_url);
  } else {
    // Direct play or remux → native <video> (token in URL: AirPlay-safe).
    const isRemux = decision.method!=='direct_play';
    setLoading(true,isRemux?"Preparing the stream…":"Loading…",
      isRemux?"remuxing to a browser-friendly container":"direct play — no conversion needed");
    let url=tok(decision.play_url);
    // Remux carries the same caps so the server copies the audio when the
    // browser can play it (Safari + AC-3) instead of re-encoding to AAC.
    if(isRemux){ url+="&"+CAPS_Q; PLAYER.offset=startSec; if(startSec>0) url+="&start="+startSec.toFixed(1); }
    if(isRemux){ PLAYER.probeUrl=decision.play_url; armStall(); }
    video.src=url;
    video.onloadedmetadata=()=>{ if(!isRemux && startSec>0){ try{video.currentTime=startSec}catch(e){} } };
    video.play().catch(()=>{});
  }

  clearInterval(PLAYER.timer);
  PLAYER.timer=setInterval(()=>reportProgress(fileId), 5000);
  video.onended=()=>{ reportProgress(fileId,true); };
  playerActivity();
}
function transcodeReason(d){
  const r=(d.reasons||[]).filter(Boolean);
  return r.length? r.join(" · ") : "building a compatible stream — this can take a few seconds";
}
function setupAirplay(video){
  const btn=document.getElementById("apbtn");
  if(!btn) return;
  if(window.WebKitPlaybackTargetAvailabilityEvent){
    video.addEventListener("webkitplaybacktargetavailabilitychanged",e=>{
      btn.style.display = e.availability==="available"?"":"none";
    });
    btn.onclick=()=>{ try{ video.webkitShowPlaybackTargetPicker(); }catch(e){} };
  } else { btn.style.display="none"; }
}
function teardownHls(){ if(PLAYER&&PLAYER.hls){ try{PLAYER.hls.destroy()}catch(e){} PLAYER.hls=null; } }

// ---- stall self-diagnosis --------------------------------------------------
// A remux/transcode that never fires `playing` used to sit on a mystery gray
// screen forever. If nothing has started after a generous grace, probe the
// actual stream URL and turn the blank overlay into a specific verdict:
// blocked-by-extension vs server-error vs reaches-browser-but-won't-decode.
function clearStall(){ if(PLAYER&&PLAYER.stallTimer){ clearTimeout(PLAYER.stallTimer); PLAYER.stallTimer=null; } }
// Rescue path: the browser rejected a remux/direct stream outright, so restart
// this playback as a server transcode (guaranteed-compatible H.264/AAC HLS).
async function startTranscodeFallback(){
  const me=PLAYER, v=document.getElementById("video");
  if(!me || !me.fileId || !v) return;
  const startSec=(me.offset||0)+(v.currentTime||0);
  teardownHls();
  let info; try{ info=await api(`/files/${me.fileId}/hls/start?height=${transcodeHeight()}&start=${startSec.toFixed(1)}`);}catch(e){ if(PLAYER===me){ setLoading(false); toast(e.message); } return; }
  if(PLAYER!==me) return;   // the user closed the player / started something else
  me.method='transcode'; me.offset=info.start_seconds||0; me.encoder=info.encoder||null;
  me.probeUrl=info.playlist_url; armStall();
  setLoading(true,"Preparing the stream…",(me.encoder?("encoder: "+me.encoder+" — "):"")+"transcoding instead of remuxing");
  attachHls(v, info.playlist_url);
}
function armStall(){ clearStall(); if(!PLAYER) return; PLAYER.stallTimer=setTimeout(()=>stallDiagnose().catch(()=>{}), 40000); }
async function stallDiagnose(){
  const v=document.getElementById("video");
  if(!PLAYER || PLAYER.started || (v&&v.currentTime>0.2)) return;   // it actually started — never mind
  const hdrs={}; if(TOKEN) hdrs["authorization"]="Bearer "+TOKEN;
  const url=PLAYER.probeUrl;
  let verdict="Playback hasn't started.", detail="Open Settings → Logs and read the last plurxd::stream / transcode line.";
  if(url){
    try{
      const ctl=new AbortController();
      const res=await fetch(url,{headers:hdrs,signal:ctl.signal});
      const status=res.status;
      let segState=null;   // 'blocked' | number(status) | null(n/a)
      if(PLAYER.method==='transcode'){
        try{
          const txt=await res.text();
          const seg=(txt.split('\n').find(l=>l&&!l.startsWith('#')&&/\.ts(\?|$)/.test(l))||"").trim();
          if(seg){ const segUrl=(seg[0]==='/'||/^https?:/.test(seg))?seg:url.replace(/[^/]*$/,seg);
            const r2=await fetch(segUrl,{headers:hdrs}); segState=r2.status; try{r2.body&&r2.body.cancel&&r2.body.cancel();}catch(e){} }
        }catch(e){ segState='blocked'; }
      } else { try{ctl.abort();}catch(e){} }    // remux: don't drain the pipe, kill_on_drop stops ffmpeg
      const serverErr = status>=500 || (typeof segState==='number'&&segState>=500);
      const reached   = status>=200 && status<400 && segState!=='blocked' && !(typeof segState==='number'&&segState>=400);
      if(serverErr){ verdict="The server couldn't build the stream."; detail="ffmpeg failed on this file — open Settings → Logs and read the last remux/transcode line, it names the real cause."; }
      else if(reached){ verdict="The stream reaches the browser but won't play."; detail="Usually a codec this browser can't decode, or an extension interfering. Try a private window with extensions off; if it still fails, the ffmpeg line in Settings → Logs will say why."; }
      else { verdict="The stream request looks blocked."; detail="A privacy/ad-blocker extension is the usual cause — it eats /stream.mp4 and /hls/*.ts requests. Open in a private window with extensions disabled, or allowlist this site, then play again."; }
    }catch(e){
      verdict="The stream request was blocked before it reached the server.";
      detail="A browser privacy or ad-blocker extension is the usual cause (it silently drops /stream.mp4 and /hls/ requests). Open in a private window with extensions disabled, or allowlist this site.";
    }
  }
  console.warn("[cinemarr] playback stall diagnosis",{method:PLAYER.method,url,networkState:v&&v.networkState,readyState:v&&v.readyState,error:v&&v.error&&v.error.code,verdict});
  if(PLAYER.started) return;   // raced with a late start
  setLoading(true, verdict, detail);
  toast(verdict);
}

// ---- loading status, projection chrome, skip intro/credits ----------------
// A staged loading overlay replaces the old mystery gray screen: the user sees
// "reading media → starting transcoder → buffering" instead of a blank spinner.
function setLoading(on,text,sub){
  const l=document.getElementById("ploading"); if(!l) return;
  if(on){
    const t=document.getElementById("ploadText"), s=document.getElementById("ploadSub");
    if(t&&text!=null) t.textContent=text;
    if(s) s.textContent=sub||"";
    l.classList.add("on");
  } else l.classList.remove("on");
}
// Reveal the title bar / cursor on activity; hide them after a quiet spell
// while the video is actually playing (projection feel).
function playerActivity(){
  const p=document.getElementById("player"); if(!p) return;
  p.classList.remove("idle");
  clearTimeout(PLAYER.idleTimer);
  PLAYER.idleTimer=setTimeout(()=>{ const v=document.getElementById("video"); if(v&&!v.paused&&!v.ended) p.classList.add("idle"); },2600);
}
// Attach the persistent listeners once; they read live PLAYER state each fire.
function wirePlayer(){
  if(PLAYER_WIRED) return; PLAYER_WIRED=true;
  const p=document.getElementById("player"), v=document.getElementById("video");
  if(!p||!v) return;
  ["mousemove","pointerdown","touchstart","keydown"].forEach(ev=>p.addEventListener(ev,playerActivity));
  v.addEventListener("playing",()=>{ PLAYER.started=true; clearStall(); setLoading(false); playerActivity(); });
  v.addEventListener("canplay",()=>{ if(PLAYER.started) setLoading(false); });
  v.addEventListener("waiting",()=>{ if(PLAYER.started) setLoading(true,"Buffering…",""); });
  v.addEventListener("pause",()=>{ p.classList.remove("idle"); });
  // A media error never reaches the console on its own — surface it, always.
  // And a remux/direct stream the browser rejects gets one automatic rescue:
  // restart as a transcode session (the server re-encodes to plain H.264/AAC).
  v.addEventListener("error",()=>{
    clearStall();
    const err=v.error, code=err?err.code:0, msg=(err&&err.message)||"";
    console.warn("[cinemarr] video error",{code,msg,method:PLAYER&&PLAYER.method,src:(v.currentSrc||"").split("?")[0]});
    if(!PLAYER || PLAYER.started){ setLoading(false); return; }
    if((PLAYER.method==='remux'||PLAYER.method==='direct_play') && !PLAYER.triedFallback){
      PLAYER.triedFallback=true;
      setLoading(true,"Stream rejected — switching to transcode…","the browser refused the "+PLAYER.method.replace('_',' ')+" stream (code "+code+"); re-encoding instead");
      startTranscodeFallback();
      return;
    }
    const names={1:"aborted",2:"network error",3:"the browser's decoder failed",4:"format not supported by this browser"};
    setLoading(true,"Playback failed: "+(names[code]||("error "+code))+".",(msg?msg+" — ":"")+"see Settings → Logs for the server side");
    toast("Playback failed — "+(names[code]||("error "+code)));
  });
  v.addEventListener("timeupdate",checkMarkers);
}
function markerNowMs(){ const v=document.getElementById("video"); return ((PLAYER.offset||0)+(v?v.currentTime||0:0))*1000; }
function checkMarkers(){
  if(!PLAYER.markers||!PLAYER.markers.length) return;
  const pos=markerNowMs();
  const m=PLAYER.markers.find(mk=> pos>=mk.start_ms && pos < mk.end_ms-400);
  renderSkip(m||null);
  if(m && PLAYER.autoskip && !m._auto){ m._auto=true; skipMarker(m); }
}
function renderSkip(m){
  const c=document.getElementById("pskip"); if(!c) return;
  if(!m){ if(c.dataset.k){ c.innerHTML=""; c.dataset.k=""; } return; }
  const key=m.kind+m.start_ms;
  if(c.dataset.k===key) return; // avoid rebuilding every timeupdate tick
  c.dataset.k=key;
  const label=m.label||(m.kind==="intro"?"Skip Intro":"Skip Credits");
  c.innerHTML=`<button onclick="skipCurrent()">${esc(label)} ›</button>`;
}
function skipCurrent(){
  const pos=markerNowMs();
  const m=(PLAYER.markers||[]).find(mk=> pos>=mk.start_ms && pos<mk.end_ms);
  if(m) skipMarker(m);
}
function skipMarker(m){
  const c=document.getElementById("pskip"); if(c){ c.innerHTML=""; c.dataset.k=""; }
  // Credits that run to the very end → treat "skip" as "finished".
  if(m.kind==="credits" && PLAYER.durMs && m.end_ms>=PLAYER.durMs-2500){
    reportProgress(PLAYER.fileId,true); return closePlayer();
  }
  seekTo(m.end_ms/1000);
}
// Seek that works for every method: direct play seeks natively; remux/transcode
// restart the server-side stream at the new offset (the stream is one-directional).
async function seekTo(targetSec){
  const v=document.getElementById("video"); if(!v) return;
  targetSec=Math.max(0,targetSec);
  if(PLAYER.method==='direct_play'){ try{ v.currentTime=targetSec; }catch(e){} playerActivity(); return; }
  const track=PLAYER.audio[PLAYER.curAudio]; const aidx=track?track.index:(PLAYER.curAudio||0);
  const curSub=PLAYER.curSub;
  setLoading(true, PLAYER.method==='transcode'?"Skipping ahead…":"Seeking…",
    PLAYER.method==='transcode'?"the transcoder is re-seeking":"");
  teardownHls();
  [...v.querySelectorAll("track")].forEach(t=>t.remove());
  if(PLAYER.method==='transcode'){
    let info; try{ info=await api(`/files/${PLAYER.fileId}/hls/start?height=${transcodeHeight()}&start=${targetSec.toFixed(1)}&audio=${aidx}`);}catch(e){ setLoading(false); return toast(e.message); }
    PLAYER.offset=info.start_seconds||0; PLAYER.encoder=info.encoder||null;
    attachHls(v, info.playlist_url);
  } else {
    PLAYER.method='remux'; PLAYER.offset=targetSec;
    v.src=tok(`/api/v1/files/${PLAYER.fileId}/stream.mp4`)+`&${CAPS_Q}&audio=${aidx}&start=${targetSec.toFixed(1)}`;
    v.play().catch(()=>{});
  }
  if(curSub>=0) setTimeout(()=>setSub(curSub),400);
}
function autoskipOn(){ try{ return localStorage.getItem("plurx_autoskip")==="1"; }catch(e){ return false; } }
function setAutoskip(on){ try{ localStorage.setItem("plurx_autoskip", on?"1":"0"); }catch(e){}
  if(PLAYER) PLAYER.autoskip=on;
  const b=document.getElementById("skipbtn"); if(b){ b.classList.toggle("on", on); b.title=(on?"Auto-skip on — ":"Auto-skip off — ")+"intro & credits"; } }
function togglePlayerAutoskip(){ setAutoskip(!autoskipOn()); toast(autoskipOn()?"Auto-skip on":"Auto-skip off"); }

// ---- audio-language + subtitle menus --------------------------------------
const LANGS={eng:"English",en:"English",jpn:"Japanese",ja:"Japanese",spa:"Spanish",es:"Spanish",
  fre:"French",fra:"French",fr:"French",ger:"German",deu:"German",de:"German",ita:"Italian",it:"Italian",
  por:"Portuguese",pt:"Portuguese",rus:"Russian",ru:"Russian",kor:"Korean",ko:"Korean",
  chi:"Chinese",zho:"Chinese",zh:"Chinese",hin:"Hindi",ara:"Arabic",nld:"Dutch",swe:"Swedish",pol:"Polish",und:"Unknown"};
function langName(c){ return c?(LANGS[c.toLowerCase()]||c.toUpperCase()):null; }
function audioLabelMenu(a,i){ return (langName(a.language)||("Track "+(i+1)))+(a.channels?" · "+fmtChannels(a.channels):"")+(a.title?" · "+a.title:""); }
function subLabelMenu(s){ return (langName(s.language)||("Subtitle "+(s.index+1)))+(s.forced?" (forced)":"")+(s.title?" · "+s.title:""); }
function setupTrackMenus(){
  const ab=document.getElementById("audiobtn"), sb=document.getElementById("subsbtn"), m=document.getElementById("pmenu");
  if(m){ m.classList.remove("on"); m.innerHTML=""; }
  if(ab) ab.style.display=(PLAYER.audio&&PLAYER.audio.length>1)?"":"none";
  // Native <track> subtitles ride the full-file timeline, so offer them for
  // direct/remux; a transcode from an offset would misalign them.
  if(sb) sb.style.display=(PLAYER.subs&&PLAYER.subs.length&&PLAYER.method!=='transcode')?"":"none";
}
function toggleMenu(kind){
  const m=document.getElementById("pmenu"); if(!m) return;
  if(m.classList.contains("on") && m.dataset.kind===kind){ m.classList.remove("on"); return; }
  m.dataset.kind=kind;
  if(kind==="audio"){
    m.innerHTML=PLAYER.audio.map((a,i)=>`<button class="${PLAYER.curAudio===i?'sel':''}" onclick="switchAudio(${i})">${esc(audioLabelMenu(a,i))}</button>`).join("");
  } else if(kind==="sync"){
    m.innerHTML=syncMenuHtml();
  } else if(kind==="quality"){
    m.innerHTML=`<div class="amsec">Quality</div>`+QUALITIES.map(([v,l])=>{
      const note=v==="auto"?" — automatic":v==="original"?" — max, no transcode":"";
      return `<button class="${playQuality()===v?'sel':''}" onclick="setQuality('${v}')">${l}${note}</button>`;
    }).join("");
  } else {
    m.innerHTML=`<button class="${PLAYER.curSub<0?'sel':''}" onclick="setSub(-1)">Off</button>`+
      PLAYER.subs.map(s=>`<button class="${PLAYER.curSub===s.index?'sel':''}" onclick="setSub(${s.index})">${esc(subLabelMenu(s))}</button>`).join("");
  }
  m.classList.add("on");
}

// ---- quality override -----------------------------------------------------
// Auto follows the automatic ladder; Original forces direct/remux (no video
// transcode); a height forces a transcode. Changing it restarts at position.
function setQuality(q){
  try{ localStorage.setItem("plurx_quality", q); }catch(e){}
  const m=document.getElementById("pmenu"); if(m) m.classList.remove("on");
  toast("Quality: "+qualityLabel());
  if(PLAYER && PLAYER.fileId){
    const v=document.getElementById("video");
    const pos=(PLAYER.offset||0)+((v&&v.currentTime)||0);
    play(PLAYER.fileId, PLAYER.title||"", Math.round(pos*1000), PLAYER.knownDur||0);
  }
}

// ---- audio sync (A/V offset) ----------------------------------------------
// Persisted per file server-side; every nudge restarts the stream at the same
// position with ffmpeg applying the shift, so it works for any method.
function offsetLabel(ms){ return ms===0?"0 ms (no correction)":`${ms>0?"+":""}${ms} ms — audio plays ${ms>0?"later":"earlier"}`; }
function syncMenuHtml(){
  return `<div class="amsec">Audio sync</div>
    <div class="syncnow">${esc(offsetLabel(PLAYER.aoffset||0))}
      ${PLAYER.declared?`<div class="hint">container declares ${PLAYER.declared>0?"+":""}${PLAYER.declared} ms (already honored)</div>`:''}</div>
    <button onclick="nudgeSync(-250)">−250 ms · audio earlier</button>
    <button onclick="nudgeSync(-50)">−50 ms · audio earlier</button>
    <button onclick="nudgeSync(50)">+50 ms · audio later</button>
    <button onclick="nudgeSync(250)">+250 ms · audio later</button>
    ${PLAYER.aoffset? `<button onclick="setSync(0)">reset to 0</button>`:''}`;
}
function nudgeSync(d){ setSync((PLAYER.aoffset||0)+d); }
async function setSync(v){
  const me=PLAYER; if(!me||!me.fileId) return;
  let saved;
  try{ saved=await api(`/files/${me.fileId}/audio-offset`,{method:"PUT",body:{offset_ms:v}}); }
  catch(e){ return toast(e.message); }
  if(PLAYER!==me) return;
  PLAYER.aoffset=saved.audio_offset_ms;
  const m=document.getElementById("pmenu");
  if(m&&m.classList.contains("on")&&m.dataset.kind==="sync") m.innerHTML=syncMenuHtml();
  toast("Audio sync: "+offsetLabel(PLAYER.aoffset));
  const video=document.getElementById("video");
  const pos=(PLAYER.offset||0)+((video&&video.currentTime)||0);
  if(PLAYER.method==='direct_play'){
    // Direct play can't carry a correction — re-decide (the server now forces
    // a remux for this file) and resume where we were.
    play(PLAYER.fileId, PLAYER.title||"", Math.round(pos*1000), PLAYER.knownDur||0);
  } else {
    seekTo(pos); // restarts the server stream; ffmpeg applies the new offset
  }
}
function setSub(index){
  const m=document.getElementById("pmenu"); if(m) m.classList.remove("on");
  PLAYER.curSub=index;
  const v=document.getElementById("video");
  [...v.querySelectorAll("track")].forEach(tr=>{ if(tr.track) tr.track.mode=(+tr.dataset.idx===index?"showing":"disabled"); });
  if(index>=0 && ![...v.querySelectorAll("track")].some(tr=>+tr.dataset.idx===index)){
    const s=PLAYER.subs.find(x=>x.index===index);
    const tr=document.createElement("track");
    tr.kind="subtitles"; tr.dataset.idx=index; tr.label=subLabelMenu(s); tr.srclang=s.language||"und";
    tr.src=tok(`/api/v1/files/${PLAYER.fileId}/subs/${index}`);
    v.appendChild(tr);
    // Setting mode triggers the fetch; do it after the element registers.
    setTimeout(()=>{ if(tr.track) tr.track.mode="showing"; },30);
  }
}
async function switchAudio(idx){
  const m=document.getElementById("pmenu"); if(m) m.classList.remove("on");
  if(idx===PLAYER.curAudio) return;
  PLAYER.curAudio=idx;
  const v=document.getElementById("video");
  const pos=(PLAYER.offset||0)+(v.currentTime||0);
  const track=PLAYER.audio[idx]; const aidx=track?track.index:idx;
  teardownHls();
  const curSub=PLAYER.curSub;
  [...v.querySelectorAll("track")].forEach(t=>t.remove()); // re-added below if a sub was on
  if(PLAYER.method==='transcode'){
    let info; try{ info=await api(`/files/${PLAYER.fileId}/hls/start?height=${transcodeHeight()}&start=${pos.toFixed(1)}&audio=${aidx}`);}catch(e){ return toast(e.message); }
    PLAYER.offset=info.start_seconds||0; PLAYER.encoder=info.encoder||null;
    attachHls(v, info.playlist_url);
  } else {
    // Switching audio forces a remux so the chosen track is the one delivered.
    PLAYER.method='remux'; PLAYER.offset=pos;
    v.src=tok(`/api/v1/files/${PLAYER.fileId}/stream.mp4`)+`&${CAPS_Q}&audio=${aidx}&start=${pos.toFixed(1)}`;
    v.play().catch(()=>{});
  }
  toast("Audio: "+(langName(track&&track.language)||("Track "+(idx+1))));
  if(curSub>=0) setTimeout(()=>setSub(curSub),400); // re-apply subtitle after reload
}

// ---- playback stats overlay (press i, or the Stats button) ----------------
let STATS_TIMER=null;
function toggleStats(){
  const ov=document.getElementById("statsov"); if(!ov) return;
  ov.classList.toggle("on");
  clearInterval(STATS_TIMER); STATS_TIMER=null;
  if(ov.classList.contains("on")){ updateStats(); STATS_TIMER=setInterval(updateStats,1000); }
}
function clockFromSec(s){ s=Math.max(0,Math.round(s)); const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60;
  return (h?h+":":"")+String(m).padStart(h?2:1,"0")+":"+String(ss).padStart(2,"0"); }
function hdrLabel(h){ return ({hdr10:"HDR10",hlg:"HLG",dolby_vision:"Dolby Vision"})[h]||(h?h.toUpperCase():""); }
function updateStats(){
  const ov=document.getElementById("statsov"); if(!ov||!ov.classList.contains("on")) return;
  const v=document.getElementById("video");
  const s=PLAYER.source||{};
  const method = PLAYER.method==='direct_play'?'Direct play'
    : PLAYER.method==='transcode'?('Transcode'+(PLAYER.encoder?` · ${PLAYER.encoder}`:'')) : 'Remux';
  // source (from the server probe — the browser never sees these numbers)
  const srcVideo=[ (s.video_codec||'').toUpperCase(), s.bit_depth?`${s.bit_depth}-bit`:null, (s.hdr_format||(s.hdr?hdrLabel(s.hdr):null)) ].filter(Boolean).join(" · ")||'—';
  const srcRes = s.width&&s.height? `${s.width}×${s.height}`:'—';
  const srcBr = s.bitrate? fmtMbps(s.bitrate):'—';
  const srcCont=(s.container||'—').toUpperCase();
  const a=PLAYER.audio&&PLAYER.audio[PLAYER.curAudio];
  const aLine=a? ([ (a.codec||'').toUpperCase(), a.channels?fmtChannels(a.channels):null, a.language?(langName(a.language)||a.language):null ].filter(Boolean).join(" · ")||'—') : '—';
  // now decoding (what the <video> element actually reports)
  const tgtRes = v.videoWidth? `${v.videoWidth}×${v.videoHeight}` : '—';
  let dropped='—';
  try{ const q=v.getVideoPlaybackQuality&&v.getVideoPlaybackQuality(); if(q) dropped=`${q.droppedVideoFrames} / ${q.totalVideoFrames}`; }catch(e){}
  let buf='—';
  try{ if(v.buffered&&v.buffered.length){ buf=Math.max(0,v.buffered.end(v.buffered.length-1)-v.currentTime).toFixed(1)+' s'; } }catch(e){}
  // network (transcode/HLS rate info)
  let net='';
  if(PLAYER.hls){
    if(PLAYER.hls.bandwidthEstimate) net+=`<div><b>Est. bandwidth</b>${fmtMbps(PLAYER.hls.bandwidthEstimate)}</div>`;
    const lv=PLAYER.hls.levels&&PLAYER.hls.levels[PLAYER.hls.currentLevel];
    if(lv&&lv.bitrate) net+=`<div><b>Stream rate</b>${fmtMbps(lv.bitrate)}</div>`;
  }
  const rate = v.playbackRate&&v.playbackRate!==1? ` · ${v.playbackRate}×`:'';
  const durTxt = PLAYER.durMs? ' / '+clockFromSec(PLAYER.durMs/1000):'';
  ov.innerHTML=
    `<div class="sechd">Playback</div>`+
    `<div><b>Method</b>${esc(method)}</div>`+
    ((PLAYER.reasons&&PLAYER.reasons.length)?`<div><b>Reason</b>${esc(PLAYER.reasons.join("; "))}</div>`:"")+
    `<div><b>Position</b>${clockFromSec((PLAYER.offset||0)+(v.currentTime||0))}${durTxt}${rate}</div>`+
    `<div class="sechd">Source</div>`+
    `<div><b>Video</b>${esc(srcVideo)}</div>`+
    `<div><b>Resolution</b>${srcRes}</div>`+
    `<div><b>Bitrate</b>${srcBr}</div>`+
    `<div><b>Container</b>${esc(srcCont)}</div>`+
    `<div><b>Audio</b>${esc(aLine)}</div>`+
    `<div><b>AV offset</b>${(PLAYER.aoffset||0)+" ms"}${PLAYER.declared?` <span style="opacity:.6">(container ${PLAYER.declared>0?"+":""}${PLAYER.declared} ms)</span>`:''}</div>`+
    `<div class="sechd">Now decoding</div>`+
    `<div><b>Resolution</b>${tgtRes}</div>`+
    `<div><b>Dropped</b>${dropped} frames</div>`+
    `<div><b>Buffer</b>${buf}</div>`+
    (net? `<div class="sechd">Network</div>`+net : '');
}
async function reportProgress(fileId, ended){
  const video=document.getElementById("video");
  const posMs=Math.round(((PLAYER.offset||0)+ (video.currentTime||0))*1000);
  // The file's probed duration is the truth; a progressive stream's
  // video.duration grows as it buffers and must not be reported.
  const durMs = PLAYER.knownDur
    || (video.duration&&isFinite(video.duration)? Math.round(((PLAYER.offset||0)+video.duration)*1000):null);
  if(!ITEM_FOR_FILE[fileId]) return;
  try{ await api(`/items/${ITEM_FOR_FILE[fileId]}/progress`,{method:"POST",body:{position_ms:ended?(durMs||posMs):posMs,duration_ms:durMs}}); }catch(e){}
}
function closePlayer(){
  const video=document.getElementById("video");
  if(PLAYER.fileId) reportProgress(PLAYER.fileId);
  clearInterval(PLAYER.timer); clearInterval(STATS_TIMER); STATS_TIMER=null; teardownHls();
  clearStall(); clearTimeout(PLAYER.idleTimer); setLoading(false);
  const ov=document.getElementById("statsov"); if(ov) ov.classList.remove("on");
  const pm=document.getElementById("pmenu"); if(pm) pm.classList.remove("on");
  const sk=document.getElementById("pskip"); if(sk){ sk.innerHTML=""; sk.dataset.k=""; }
  const pl=document.getElementById("player"); if(pl) pl.classList.remove("idle");
  [...video.querySelectorAll("track")].forEach(t=>t.remove());
  video.pause(); video.removeAttribute("src"); video.load();
  document.getElementById("modal").classList.remove("open");
  if(location.hash.startsWith("#/item/")) { const id=location.hash.split("/")[2]; setTimeout(()=>viewItem(id),100); }
}
// Keyboard while the player is open: 'i' toggles stats, Esc closes (unless the
// native fullscreen is up — then Esc belongs to the browser's exit-fullscreen).
window.addEventListener("keydown",e=>{
  if(!document.getElementById("modal").classList.contains("open")) return;
  const typing=/^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName||""));
  if((e.key==='i'||e.key==='I') && !typing){ e.preventDefault(); toggleStats(); }
  else if(e.key==='Escape' && !document.fullscreenElement){ closePlayer(); }
});

function statusText(st){
  if(!st) return "idle";
  if(st.running){
    if(st.phase==="enriching") return "fetching metadata…";
    const p=st.progress;
    return "scanning…"+(p&&p.found?` ${p.processed} / ${p.found} files`:"");
  }
  if(st.error) return `<span style="color:var(--bad)">error: ${esc(st.error)}</span>`;
  if(st.last_scan){
    const r=st.last_scan;
    let s=`${r.added} added, ${r.updated} updated, ${r.unchanged} unchanged`;
    if(r.removed_files) s+=`, ${r.removed_files} removed`;
    if(r.skipped) s+=`, ${r.skipped} skipped`;
    if(r.errors) s+=`, <span style="color:var(--bad)">${r.errors} error${r.errors>1?'s':''}</span>`;
    if(st.finished_at) s+=` <span style="opacity:.7">· ${fmtAgo(st.finished_at)}</span>`;
    s+=(r.problems||[]).map(p=>`<div class="problem">⚠ ${esc(p)}</div>`).join("");
    return s;
  }
  return "idle";
}

async function settingsTick(){
  const h=location.hash;
  if(h!=="#/settings"&&h!=="#/admin") return;
  try{
    const status=await api("/scan/status");
    for(const [id,st] of Object.entries(status)){
      const el=document.getElementById("st-"+id);
      if(el) el.innerHTML=statusText(st);
    }
    const auto=document.getElementById("logauto");
    if(auto&&auto.checked) refreshLogs();
    // Live Trakt card: the device-link poll and sync state resolve server-side.
    if(!TRAKT_EDIT){
      const t=await api("/trakt/status");
      if(JSON.stringify(t)!==JSON.stringify(TRAKT)){ TRAKT=t; paintTrakt(); }
    }
  }catch(e){}
}
async function refreshLogs(){
  const box=document.getElementById("logbox"); if(!box) return;
  const sel=document.getElementById("loglvl");
  try{
    const lines=await api(`/system/logs?level=${sel?sel.value:"info"}&limit=300`);
    const stick = box.scrollHeight-box.scrollTop-box.clientHeight < 40;
    box.innerHTML=lines.map(l=>`<div class="log-${esc(l.level)}">${fmtTs(l.ts_ms)} <b>${esc(l.level)}</b> ${esc(l.target)} — ${esc(l.message)}</div>`).join("")
      ||'<span class="muted">Nothing at this level yet.</span>';
    if(stick) box.scrollTop=box.scrollHeight;
  }catch(e){ box.textContent="Failed to load logs: "+e.message; }
}

function traktCardHtml(t){
  if(t===null||t===undefined) return "";
  let body="";
  if(!t.configured||TRAKT_EDIT){
    body=`<p class="muted" style="margin-top:0">Scrobble what you watch and sync watched history + resume points both ways.
      Create an API app at <a href="https://trakt.tv/oauth/applications" target="_blank" rel="noopener">trakt.tv/oauth/applications</a>
      (redirect URI <code>urn:ietf:wg:oauth:2.0:oob</code>), then paste its keys.</p>
      <label>Client ID</label><input id="tcid" type="password" autocomplete="off" value="${esc((SETTINGS&&SETTINGS.trakt_client_id)||'')}" onfocus="this.type='text'" onblur="this.type='password'">
      <label>Client secret</label><input id="tcs" type="password" autocomplete="off" value="${esc((SETTINGS&&SETTINGS.trakt_client_secret)||'')}" onfocus="this.type='text'" onblur="this.type='password'">
      <div class="err" id="tkerr"></div>
      <button style="margin-top:12px" onclick="saveTraktKeys()">Save keys</button>`;
  } else if(t.pending && !t.pending.error){
    body=`<p class="muted" style="margin-top:0">Go to <a href="${esc(t.pending.verification_url)}" target="_blank" rel="noopener">${esc(t.pending.verification_url)}</a> and enter:</p>

      <p class="hint">Waiting for approval — this updates by itself.</p>
      <div class="row" style="margin-top:8px"><button class="ghost sm" onclick="traktUnlink()">Cancel</button></div>`;
  } else if(t.linked){
    body=`<p style="margin-top:0">Connected as <b>${esc(t.trakt_username||"?")}</b>${t.last_sync_at?` <span class="muted">· last sync ${fmtAgo(t.last_sync_at)}</span>`:""}${t.syncing?' <span class="muted">· syncing now…</span>':''}</p>
      ${t.note?`<p class="hint">${esc(t.note)}</p>`:''}
      <div class="row"><button class="ghost sm" onclick="traktSyncNow()">Sync now</button>
        <button class="ghost sm" onclick="traktUnlink()">Disconnect</button></div>`;
  } else {
    body=`<p class="muted" style="margin-top:0">Keys saved. Link your Trakt account with a one-time code.</p>
      ${t.pending&&t.pending.error?`<div class="err">${esc(t.pending.error)}</div>`:''}

        <button class="ghost sm" onclick="TRAKT_EDIT=true;paintTrakt()">Change keys</button></div>`;
  }
  return `<div class="card" id="traktcard"><h2 class="section" style="margin-top:0">Trakt</h2>${body}</div>`;
}
function paintTrakt(){ const el=document.getElementById("traktcard"); if(el) el.outerHTML=traktCardHtml(TRAKT); }
async function saveTraktKeys(){
  const err=document.getElementById("tkerr"); err.textContent="";

// ---- users (admin) --------------------------------------------------------
function userRow(u){
  const me = ME&&ME.id===u.id;
  const created = new Date(u.created_at*1000).toLocaleDateString();
  const role = u.is_admin?`<span class="pill" style="color:var(--accent);border-color:var(--accent)">admin</span>`:`<span class="muted">user</span>`;
  const btns=[`<button class="ghost sm" onclick='resetPw(${u.id},${JSON.stringify(u.username)})'>Reset password</button>`];
  btns.push(`<button class="ghost sm" onclick="setAdmin(${u.id},${u.is_admin?0:1})">${u.is_admin?'Revoke admin':'Make admin'}</button>`);
  if(!me) btns.push(`<button class="ghost sm" onclick='delUser(${u.id},${JSON.stringify(u.username)})'>Delete</button>`);
  return `<tr><td><b>${esc(u.username)}</b>${me?' <span class="muted">(you)</span>':''}</td><td>${role}</td><td class="muted">${created}</td>
    <td class="row" style="flex-wrap:wrap;justify-content:flex-end">${btns.join("")}</td></tr>`;
}
async function addUser(){
  const username=un.value.trim(), password=up.value, is_admin=ua.checked;
  const err=document.getElementById("uerr"); err.textContent="";
  try{ await api("/users",{method:"POST",body:{username,password,is_admin}}); toast("User added"); viewSettings(); }

async function resetPw(id, name){
  const pw=prompt(`New password for ${name} (min 8 characters). Their current sessions will be signed out.`);
  if(pw==null) return;
  try{ await api(`/users/${id}`,{method:"PUT",body:{password:pw}}); toast("Password reset"); }catch(e){ toast(e.message); }

async function setAdmin(id, makeAdmin){
  try{ await api(`/users/${id}`,{method:"PUT",body:{is_admin:!!makeAdmin}}); toast(makeAdmin?"Now an admin":"Admin revoked"); viewSettings(); }catch(e){ toast(e.message); }

async function delUser(id, name){
  if(!confirm(`Delete ${name}? Their watch history is removed. Media files are untouched.`)) return;
  try{ await api(`/users/${id}`,{method:"DELETE"}); toast("User deleted"); viewSettings(); }catch(e){ toast(e.message); }
}

// ---- router ---------------------------------------------------------------
// One page-scoped poller at a time; routing away always clears it.
let PAGE_TIMER=null;
function setPageTimer(fn,ms){ clearInterval(PAGE_TIMER); PAGE_TIMER=setInterval(fn,ms); }
async function render(){
  if(!TOKEN||!ME) return boot();
  clearInterval(PAGE_TIMER);
  if(!ACT_TIMER) ACT_TIMER=setInterval(pollActivity,4000);
  const h=location.hash||"#/";
  try{
    if(h.startsWith("#/item/")) return await viewItem(h.split("/")[2]);
    if(h.startsWith("#/library/")) return await viewLibrary(h.split("/")[2]);
    if(h.startsWith("#/search/")) return await viewSearch(decodeURIComponent(h.split("/")[2]||""));
    if(h==="#/activity") return await viewActivity();
    if(h==="#/admin"||h==="#/settings") return await viewSettings();
    return await viewHome();
  }catch(e){
    if(e.message!=="unauthorized"){ const m=document.getElementById("main"); if(m) m.innerHTML=`<div class="empty">${esc(e.message)}</div>`; else toast(e.message); }
  }
}
window.addEventListener("hashchange",render);

boot();
