# plurx single-node deployment.
#
# Host-specific configuration (your media mounts, GPU passthrough, alternate
# ports) belongs in an override file, so this tracked file never needs local
# edits and `git pull` always applies cleanly:
#
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   $EDITOR docker-compose.override.yml         # your mounts, your GPU
#   cp .env.example .env                        # only if changing ports
#   docker compose up -d --build
#
# Compose merges docker-compose.override.yml automatically; both it and .env
# are gitignored. There is no published registry image yet, so the service
# builds from the Dockerfile in the repo root ('up -d --build' the first time
# and after pulling changes). Once a registry image exists, the `build:` block
# goes away.
#
# plurx never writes to your media; mount it read-only (`:ro`). The named
# volume holds the database, artwork cache, and transcode scratch.

services:
  plurxd:
    build:
      context: ..            # repo root (where the Dockerfile + workspace live)
      dockerfile: Dockerfile
    image: plurx/plurxd:latest
    container_name: plurxd
    restart: unless-stopped
    ports:
      - "32600:32600"                          # HTTP API + web app
      # GDM discovery for Plex clients. Discovery only works on host port
      # 32414; if something else owns it (a still-running Plex), set
      # PLURX_GDM_PORT in .env to park it elsewhere until Plex retires.
      - "${PLURX_GDM_PORT:-32414}:32414/udp"
    environment:
      PLURX_SERVER_NAME: "plurx"
      PLURX_BIND: "0.0.0.0:32600"
      PLURX_DATA_DIR: "/var/lib/plurx"
    volumes:
      - plurx-data:/var/lib/plurx
      # Media mounts go in docker-compose.override.yml (see example file).

volumes:
  plurx-data:
